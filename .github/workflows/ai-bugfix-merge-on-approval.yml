name: AI Bug Fix – Merge on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  merge-if-ready:
    # Only react to approved reviews on ai-bugfix branches
    if: |
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'ai-bugfix/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
      ALLOWED_REVIEWERS:       ${{ vars.ARGUS_AI_BUGFIX_ALLOWED_REVIEWERS }}
      PULL_NUMBER:             ${{ github.event.pull_request.number }}
      ARGUS_AI_BUGFIX_CALLBACK_TOKEN: ${{ secrets.ARGUS_AI_BUGFIX_CALLBACK_TOKEN }}
      ARGUS_MAINTENANCE_API_BASE_URL: ${{ vars.ARGUS_MAINTENANCE_API_BASE_URL }}
      REPO:                    ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge if approved and green
        run: node scripts/ai-bugfix/merge-if-ready.mjs
