name: AI Bug Fix

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "ai_bug_fix_runs.id (UUID)"
        required: true
      prompt_bundle_url:
        description: "Maintenance API prompt-bundle URL"
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ai-bugfix-${{ inputs.run_id }}
  cancel-in-progress: false

jobs:
  generate-pr:
    runs-on: ubuntu-latest
    env:
      ARGUS_AI_BUGFIX_RUN_ID:            ${{ inputs.run_id }}
      ARGUS_AI_BUGFIX_CALLBACK_TOKEN:    ${{ secrets.ARGUS_AI_BUGFIX_CALLBACK_TOKEN }}
      ARGUS_MAINTENANCE_API_BASE_URL:    ${{ vars.ARGUS_MAINTENANCE_API_BASE_URL }}
      OPENAI_API_KEY:                    ${{ secrets.OPENAI_API_KEY }}
      PROMPT_BUNDLE_URL:                 ${{ inputs.prompt_bundle_url }}
      GH_TOKEN:                          ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── 1. Fetch the prompt bundle from the live Maintenance API ──────────
      - name: Fetch prompt bundle
        run: |
          curl -fsS \
            -H "Authorization: Bearer $ARGUS_AI_BUGFIX_CALLBACK_TOKEN" \
            "$PROMPT_BUNDLE_URL" \
            -o /tmp/argus-ai-bugfix-prompt.json
          echo "Prompt bundle fetched ($(wc -c < /tmp/argus-ai-bugfix-prompt.json) bytes)"

      # ── 2. Call the AI and apply the patch ────────────────────────────────
      - name: Generate and apply AI patch
        run: node scripts/ai-bugfix/apply-ai-patch.mjs /tmp/argus-ai-bugfix-prompt.json

      # ── 3. Build validation ───────────────────────────────────────────────
      - name: Restore
        run: dotnet restore ArgusEngine.slnx

      - name: Build
        run: dotnet build ArgusEngine.slnx --configuration Release --no-restore

      - name: Test
        run: |
          if [ -f "./test.sh" ]; then
            chmod +x ./test.sh
            ./test.sh unit || true
          else
            dotnet test ArgusEngine.slnx --configuration Release --no-build --filter "Category=Unit" || true
          fi

      # ── 4. Create (or update) the PR ──────────────────────────────────────
      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: "ai-bugfix/${{ inputs.run_id }}"
          title: "AI bug fix: diagnostics run ${{ inputs.run_id }}"
          body-path: /tmp/argus-ai-bugfix-pr-body.md
          commit-message: "fix: AI-generated fixes for diagnostics run ${{ inputs.run_id }}"
          labels: "ai-bugfix,automated"
          delete-branch: false

      # ── 5. Report back to the Maintenance API ─────────────────────────────
      - name: Report status (success)
        if: success() && steps.create_pr.outputs.pull-request-url != ''
        run: node scripts/ai-bugfix/report-status.mjs
        env:
          STATUS:     "PullRequestOpen"
          STATUS_MSG: "PR created; waiting for review and approval."
          PR_NUMBER:  ${{ steps.create_pr.outputs.pull-request-number }}
          PR_URL:     ${{ steps.create_pr.outputs.pull-request-url }}
          BRANCH:     "ai-bugfix/${{ inputs.run_id }}"
          WORKFLOW_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WORKFLOW_RUN_ID: ${{ github.run_id }}

      - name: Report status (failure)
        if: failure()
        run: node scripts/ai-bugfix/report-status.mjs
        env:
          STATUS:        "Failed"
          STATUS_MSG:    "GitHub Actions workflow failed."
          FAILURE_DETAIL: "See workflow run ${{ github.run_id }} for logs."
          WORKFLOW_URL:   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WORKFLOW_RUN_ID: ${{ github.run_id }}
