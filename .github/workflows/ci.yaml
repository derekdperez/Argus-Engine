name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-test:
    name: Build and test .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore ArgusEngine.slnx

      - name: Build
        run: dotnet build ArgusEngine.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: ./test.sh unit

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build command-center image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: argus-engine/command-center:ci
          build-args: |
            BUILD_SOURCE_STAMP=${{ github.sha }}
            COMPONENT_VERSION=ci-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max