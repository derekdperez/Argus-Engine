name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  CONFIGURATION: Release
  ARGUS_DIAGNOSTICS_API_KEY: ci-smoke-test-key

jobs:
  dotnet-build-test:
    name: Build and test .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore ArgusEngine.slnx

      - name: Build
        run: dotnet build ArgusEngine.slnx --configuration "$CONFIGURATION" --no-restore

      - name: Run unit and integration tests
        env:
          ARGUS_TEST_NO_BUILD: "1"
        run: |
          chmod +x ./test.sh ./scripts/run-tests.sh
          ./test.sh all

  deployment-manifest-validation:
    name: Validate deployment manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Compose manifests
        env:
          ARGUS_ENGINE_VERSION: ci-${{ github.run_number }}
          BUILD_SOURCE_STAMP: ${{ github.sha }}
          ARGUS_DIAGNOSTICS_API_KEY: ci-smoke-test-key
        run: ./deploy validate --ci

  docker-build:
    name: Docker build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - dotnet-build-test
      - deployment-manifest-validation

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: command-center-gateway
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Gateway
            app_dll: ArgusEngine.CommandCenter.Gateway.dll
          - service: command-center-web
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Web
            app_dll: ArgusEngine.CommandCenter.Web.dll
          - service: command-center-operations-api
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Operations.Api
            app_dll: ArgusEngine.CommandCenter.Operations.Api.dll
          - service: command-center-discovery-api
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Discovery.Api
            app_dll: ArgusEngine.CommandCenter.Discovery.Api.dll
          - service: command-center-worker-control-api
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.WorkerControl.Api
            app_dll: ArgusEngine.CommandCenter.WorkerControl.Api.dll
          - service: command-center-maintenance-api
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Maintenance.Api
            app_dll: ArgusEngine.CommandCenter.Maintenance.Api.dll
          - service: command-center-updates-api
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Updates.Api
            app_dll: ArgusEngine.CommandCenter.Updates.Api.dll
          - service: command-center-realtime
            dockerfile: deployment/Dockerfile.commandcenter-host
            project_dir: ArgusEngine.CommandCenter.Realtime.Host
            app_dll: ArgusEngine.CommandCenter.Realtime.Host.dll
          - service: command-center-bootstrapper
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.CommandCenter.Bootstrapper
            app_dll: ArgusEngine.CommandCenter.Bootstrapper.dll
          - service: command-center-spider-dispatcher
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.CommandCenter.SpiderDispatcher
            app_dll: ArgusEngine.CommandCenter.SpiderDispatcher.dll
          - service: gatekeeper
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Gatekeeper
            app_dll: ArgusEngine.Gatekeeper.dll
          - service: worker-spider
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.Spider
            app_dll: ArgusEngine.Workers.Spider.dll
          - service: worker-http-requester
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.HttpRequester
            app_dll: ArgusEngine.Workers.HttpRequester.dll
          - service: worker-enum
            dockerfile: deployment/Dockerfile.worker-enum
            project_dir: ArgusEngine.Workers.Enumeration
            app_dll: ArgusEngine.Workers.Enumeration.dll
          - service: worker-portscan
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.PortScan
            app_dll: ArgusEngine.Workers.PortScan.dll
          - service: worker-highvalue
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.HighValue
            app_dll: ArgusEngine.Workers.HighValue.dll
          - service: worker-techid
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.TechnologyIdentification
            app_dll: ArgusEngine.Workers.TechnologyIdentification.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without pushing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: argus-engine/${{ matrix.service }}:ci
          build-args: |
            PROJECT_DIR=${{ matrix.project_dir }}
            APP_DLL=${{ matrix.app_dll }}
            BUILD_SOURCE_STAMP=${{ github.sha }}
            COMPONENT_VERSION=ci-${{ github.run_number }}
          cache-from: type=gha,scope=argus-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=argus-${{ matrix.service }}

  compose-startup-smoke:
    name: Compose startup smoke
    runs-on: ubuntu-latest
    needs: docker-build

    env:
      ARGUS_ENGINE_VERSION: ci-${{ github.run_number }}
      BUILD_SOURCE_STAMP: ${{ github.sha }}
      ARGUS_DIAGNOSTICS_API_KEY: ci-smoke-test-key
      ARGUS_LOCAL_BASE_URL: http://127.0.0.1:8081
      BASE_URL: http://127.0.0.1:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start production-like split stack
        run: |
          docker compose \
            -f deployment/docker-compose.yml \
            -f deployment/docker-compose.ci.yml \
            up -d --build \
            postgres \
            filestore-db-init \
            redis \
            rabbitmq \
            command-center-bootstrapper \
            command-center-web \
            command-center-operations-api \
            command-center-discovery-api \
            command-center-worker-control-api \
            command-center-maintenance-api \
            command-center-updates-api \
            command-center-realtime \
            command-center-gateway \
            gatekeeper \
            worker-spider \
            worker-http-requester

      - name: Wait for gateway readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS "${ARGUS_LOCAL_BASE_URL}/health/ready" >/dev/null; then
              exit 0
            fi

            docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml ps
            sleep 5
          done

          echo "Gateway did not become ready."
          docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml logs --tail=300
          exit 1

      - name: Run split-service smoke tests
        run: ./deploy smoke

      - name: Verify selected background services stayed running
        run: |
          for service in gatekeeper worker-spider worker-http-requester; do
            container_id="$(docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml ps -q "$service")"
            if [ -z "$container_id" ]; then
              echo "No container was created for $service." >&2
              exit 1
            fi

            status="$(docker inspect -f '{{.State.Status}}' "$container_id")"
            if [ "$status" != "running" ]; then
              echo "$service is not running; actual status: $status" >&2
              docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml logs --tail=200 "$service"
              exit 1
            fi
          done

      - name: Show container status on failure
        if: failure()
        run: |
          docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml ps
          docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml logs --tail=300

      - name: Cleanup
        if: always()
        run: docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.ci.yml down -v --remove-orphans
