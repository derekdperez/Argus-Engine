name: Build and Push Images to ECR

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Space-separated services to publish, or 'all'"
        required: false
        default: "all"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-ecr-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_ACCOUNT_ID: "415144299522"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_PREFIX: ${{ vars.ECR_PREFIX || 'argus-v2' }}
  ROLE_TO_ASSUME: arn:aws:iam::415144299522:role/ArgusEngineGitHubActionsRole
  RUN_SERVICES: ${{ inputs.services || 'all' }}

jobs:
  ensure-ecr:
    name: Ensure ECR repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repositories exist
        run: ./deploy ecs repos

  build-push:
    name: Build and push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: ensure-ecr

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: command-center
            dockerfile: deployment/Dockerfile.web
            project_dir: ArgusEngine.CommandCenter
            app_dll: ArgusEngine.CommandCenter.dll
          - service: gatekeeper
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Gatekeeper
            app_dll: ArgusEngine.Gatekeeper.dll
          - service: worker-spider
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.Spider
            app_dll: ArgusEngine.Workers.Spider.dll
          - service: worker-enum
            dockerfile: deployment/Dockerfile.worker-enum
            project_dir: ArgusEngine.Workers.Enumeration
            app_dll: ArgusEngine.Workers.Enumeration.dll
          - service: worker-portscan
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.PortScan
            app_dll: ArgusEngine.Workers.PortScan.dll
          - service: worker-highvalue
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.HighValue
            app_dll: ArgusEngine.Workers.HighValue.dll
          - service: worker-techid
            dockerfile: deployment/Dockerfile.worker
            project_dir: ArgusEngine.Workers.TechnologyIdentification
            app_dll: ArgusEngine.Workers.TechnologyIdentification.dll

    steps:
      - name: Checkout
        if: ${{ env.RUN_SERVICES == 'all' || contains(format(' {0} ', env.RUN_SERVICES), format(' {0} ', matrix.service)) }}
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: ${{ env.RUN_SERVICES == 'all' || contains(format(' {0} ', env.RUN_SERVICES), format(' {0} ', matrix.service)) }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ env.RUN_SERVICES == 'all' || contains(format(' {0} ', env.RUN_SERVICES), format(' {0} ', matrix.service)) }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        if: ${{ env.RUN_SERVICES == 'all' || contains(format(' {0} ', env.RUN_SERVICES), format(' {0} ', matrix.service)) }}
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        if: ${{ env.RUN_SERVICES == 'all' || contains(format(' {0} ', env.RUN_SERVICES), format(' {0} ', matrix.service)) }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}:latest
          build-args: |
            PROJECT_DIR=${{ matrix.project_dir }}
            APP_DLL=${{ matrix.app_dll }}
            BUILD_SOURCE_STAMP=${{ github.sha }}
            COMPONENT_VERSION=ci-${{ github.run_number }}
          cache-from: type=gha,scope=argus-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=argus-${{ matrix.service }}
