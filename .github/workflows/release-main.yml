name: Main Branch Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'deploy/**'
      - 'scripts/**'
      - 'test.sh'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'NuGet.config'
      - 'global.json'
      - '.github/workflows/release-main.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  CONFIGURATION: Release
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '415144299522' }}
  ECR_PREFIX: ${{ vars.ECR_PREFIX || 'argus-v2' }}
  ROLE_TO_ASSUME: ${{ vars.ARGUS_AWS_GITHUB_ACTIONS_ROLE || 'arn:aws:iam::415144299522:role/ArgusEngineGitHubActionsRole' }}
  IMAGE_TAG: ${{ github.sha }}
  BUILD_SOURCE_STAMP: ${{ github.sha }}
  COMPONENT_VERSION: ci-${{ github.run_number }}

jobs:
  detect-affected-services:
    name: Detect affected deployable services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      reason: ${{ steps.detect.outputs.reason }}
      diff_range: ${{ steps.detect.outputs.diff_range }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect affected services
        id: detect
        run: python3 deploy/detect-affected-services.py --format github-output

      - name: Show deploy plan
        run: |
          echo "Diff range: ${{ steps.detect.outputs.diff_range }}"
          echo "Reason: ${{ steps.detect.outputs.reason }}"
          echo "Services: ${{ steps.detect.outputs.services }}"

  build-and-unit-tests:
    name: Build solution and run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore
        run: dotnet restore ArgusEngine.slnx

      - name: Build
        run: dotnet build ArgusEngine.slnx --configuration "$CONFIGURATION" --no-restore

      - name: Run unit test suite
        env:
          ARGUS_TEST_NO_BUILD: "1"
        run: |
          chmod +x ./test.sh ./scripts/run-tests.sh
          ./test.sh unit

  e2e-tests:
    name: Validate release deployment manifests
    runs-on: ubuntu-latest
    needs:
      - build-and-unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate deploy manifests for release
        run: ./deploy validate --ci

  deploy-production:
    name: Deploy to ECS production
    runs-on: ubuntu-latest
    needs:
      - detect-affected-services
      - e2e-tests
    if: needs.detect-affected-services.outputs.has_changes == 'true'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Write ECS service environment
        env:
          ARGUS_ECS_SERVICE_ENV: ${{ secrets.ARGUS_ECS_SERVICE_ENV }}
        run: |
          test -n "$ARGUS_ECS_SERVICE_ENV"
          printf '%s\n' "$ARGUS_ECS_SERVICE_ENV" > deployment/aws/service-env

      - name: Ensure ECR repositories
        env:
          AFFECTED_SERVICES: ${{ needs.detect-affected-services.outputs.services }}
        run: |
          read -r -a services <<< "$AFFECTED_SERVICES"
          ./deploy ecs repos "${services[@]}"

      - name: Build and push production images
        env:
          AFFECTED_SERVICES: ${{ needs.detect-affected-services.outputs.services }}
        run: |
          read -r -a services <<< "$AFFECTED_SERVICES"
          ./deploy ecs build "${services[@]}"

      - name: Deploy ECS services
        env:
          AFFECTED_SERVICES: ${{ needs.detect-affected-services.outputs.services }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'argus-engine' }}
          ECS_SUBNETS: ${{ vars.ECS_SUBNETS }}
          ECS_SECURITY_GROUPS: ${{ vars.ECS_SECURITY_GROUPS }}
          ECS_TASK_EXECUTION_ROLE_ARN: ${{ vars.ECS_TASK_EXECUTION_ROLE_ARN }}
          ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN || '' }}
          ECS_LAUNCH_TYPE: ${{ vars.ECS_LAUNCH_TYPE || 'FARGATE' }}
          ECS_ASSIGN_PUBLIC_IP: ${{ vars.ECS_ASSIGN_PUBLIC_IP || 'DISABLED' }}
          ECS_LOG_GROUP: ${{ vars.ECS_LOG_GROUP || '/ecs/argus-v2' }}
          ECS_LOG_PREFIX: ${{ vars.ECS_LOG_PREFIX || 'argus-v2' }}
          COMMAND_CENTER_SERVICE: ${{ vars.COMMAND_CENTER_SERVICE || 'argus-command-center-gateway' }}
          GATEKEEPER_SERVICE: ${{ vars.GATEKEEPER_SERVICE || 'argus-gatekeeper' }}
          WORKER_SPIDER_SERVICE: ${{ vars.WORKER_SPIDER_SERVICE || 'argus-worker-spider' }}
          WORKER_ENUM_SERVICE: ${{ vars.WORKER_ENUM_SERVICE || 'argus-worker-enum' }}
          WORKER_PORTSCAN_SERVICE: ${{ vars.WORKER_PORTSCAN_SERVICE || 'argus-worker-portscan' }}
          WORKER_HIGHVALUE_SERVICE: ${{ vars.WORKER_HIGHVALUE_SERVICE || 'argus-worker-highvalue' }}
          WORKER_TECHID_SERVICE: ${{ vars.WORKER_TECHID_SERVICE || 'argus-worker-techid' }}
          WORKER_HTTP_REQUESTER_SERVICE: ${{ vars.WORKER_HTTP_REQUESTER_SERVICE || 'argus-worker-http-requester' }}
          SERVICE_ENV_FILE: deployment/aws/service-env
          UPDATE_DESIRED_COUNTS: ${{ vars.UPDATE_DESIRED_COUNTS || 'false' }}
          ECS_FORCE_NEW_DEPLOYMENT: "false"
        run: |
          read -r -a services <<< "$AFFECTED_SERVICES"
          ./deploy ecs deploy "${services[@]}"

  no-production-deploy-needed:
    name: No production deploy needed
    runs-on: ubuntu-latest
    needs:
      - detect-affected-services
      - e2e-tests
    if: needs.detect-affected-services.outputs.has_changes != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "No deployable services were affected."
          echo "Reason: ${{ needs.detect-affected-services.outputs.reason }}"

  report-ai-bugfix-deploy:
    name: Report AI bug fix deployment status
    runs-on: ubuntu-latest
    needs:
      - deploy-production
      - no-production-deploy-needed
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Report Deployment Status
        env:
          ARGUS_AI_BUGFIX_CALLBACK_TOKEN: ${{ secrets.ARGUS_AI_BUGFIX_CALLBACK_TOKEN }}
          ARGUS_MAINTENANCE_API_BASE_URL: ${{ vars.ARGUS_MAINTENANCE_API_BASE_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          WORKFLOW_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Try to extract runId from the commit message: "Automated merge of AI bug fix for run <uuid>"
          if [[ "$COMMIT_MSG" =~ "Automated merge of AI bug fix for run "([a-fA-F0-9-]+) ]]; then
            export ARGUS_AI_BUGFIX_RUN_ID="${BASH_REMATCH[1]}"
            echo "Detected AI bug fix run ID: $ARGUS_AI_BUGFIX_RUN_ID"
            
            # Determine overall success from the needs context
            # Since needs is a matrix of results, we check if any failed
            # deploy-production can be skipped if no changes
            export STATUS="Deployed"
            export STATUS_MSG="Release pipeline completed."
            export DEPLOYMENT_URL="$WORKFLOW_URL"

            # Check if any dependencies failed
            if [ "${{ needs.deploy-production.result }}" == "failure" ] || [ "${{ needs.e2e-tests.result }}" == "failure" ] || [ "${{ needs.build-and-unit-tests.result }}" == "failure" ]; then
              export STATUS="Failed"
              export STATUS_MSG="Release pipeline failed."
              export FAILURE_DETAIL="Deployment failed. See workflow $WORKFLOW_URL"
            fi
            
            node scripts/ai-bugfix/report-status.mjs
          else
            echo "Not an AI bug fix merge. Skipping report."
          fi
