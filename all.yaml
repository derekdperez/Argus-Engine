  - engine:
      - sh
      - bash
    source: |
      aws ec2 describe-security-groups --region $region --output json --query 'SecurityGroups[*].GroupId'

    extractors:
      - type: json
        name: securitygroups
        internal: true
        json:
          - '.[]'

  - engine:
      - sh
      - bash
    source: |
         aws ec2 describe-security-groups --region $region --group-ids $groupid --query 'SecurityGroups[*].IpPermissionsEgress[]'

    matchers:
      - type: word
        words:
          - "0.0.0.0/0"
