# Optional local observability stack for Argus Engine.
#
# Start the application and observability stack together:
#
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.observability.yml up -d --build
#
# Then open:
#   Grafana:    http://localhost:3000  admin/admin
#   Prometheus: http://localhost:9090
#   OTLP gRPC:  localhost:4317
#   OTLP HTTP:  localhost:4318

services:
  command-center:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  gatekeeper:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  worker-spider:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  worker-enum:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  worker-portscan:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  worker-highvalue:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  worker-techid:
    environment:
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - command-center

  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheusdata:
  grafanadata:
