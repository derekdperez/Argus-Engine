# Run from the repository root:
# docker compose -f deploy/docker-compose.yml up -d --build
#
# Project-specific deployment version rule:
# Bump ARGUS_ENGINE_VERSION before every deploy. The Command Center System Status
# screen reads container image labels/tags and will show stale versions if this
# stays unchanged.
name: argus-engine

x-component-version: &component-version ${ARGUS_ENGINE_VERSION:-2.6.2}

x-dotnet-build-args: &dotnet-build-args
  BUILD_SOURCE_STAMP: ${BUILD_SOURCE_STAMP:-unknown}
  COMPONENT_VERSION: *component-version

x-enum-build-args: &enum-build-args
  <<: *dotnet-build-args
  SUBFINDER_PACKAGE: ${SUBFINDER_PACKAGE:-github.com/projectdiscovery/subfinder/v2/cmd/subfinder@v2.14.0}
  AMASS_PACKAGE: ${AMASS_PACKAGE:-github.com/owasp-amass/amass/v5/cmd/amass@v5.1.1}

x-common-env: &common-env
  ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=argus_engine;Username=argus;Password=argus
  ConnectionStrings__FileStore: Host=postgres;Port=5432;Database=argus_engine_files;Username=argus;Password=argus
  Argus__Postgres__MaxPoolSize: ${ARGUS_POSTGRES_MAX_POOL_SIZE:-8}
  Argus__FileStore__MaxPoolSize: ${ARGUS_FILESTORE_MAX_POOL_SIZE:-4}
  ConnectionStrings__Redis: redis:6379
  RabbitMq__Host: rabbitmq
  RabbitMq__Username: argus
  RabbitMq__Password: argus
  RabbitMq__VirtualHost: /
  RabbitMq__ManagementUrl: http://rabbitmq:15672
  ARGUS_COMPONENT_VERSION: *component-version
  Argus__Diagnostics__ApiKey: ${ARGUS_DIAGNOSTICS_API_KEY:-local-dev-diagnostics-key-change-me}

configs:
  filestore_db_init_sh:
    content: |
      #!/bin/sh
      set -e
      echo "Connecting to postgres as user 'argus' to check/create 'argus_engine_files'..."
      # Use argus_engine as the maintenance DB since it's what we defined in POSTGRES_DB
      if psql -h postgres -U argus -d argus_engine -tAc "SELECT 1 FROM pg_database WHERE datname = 'argus_engine_files'" 2>/dev/null | grep -q '1'; then
        echo "argus_engine_files already exists; nothing to do."
        exit 0
      fi
      echo "Creating database argus_engine_files..."
      psql -h postgres -U argus -d argus_engine -v ON_ERROR_STOP=1 -c "CREATE DATABASE argus_engine_files OWNER argus;"
      echo "Done."

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-300}"]
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus_engine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  filestore-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: argus
    configs:
      - source: filestore_db_init_sh
        target: /run/filestore-db-init.sh
    entrypoint: ["/bin/sh", "/run/filestore-db-init.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: argus
      RABBITMQ_DEFAULT_PASS: argus
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  command-center:
    image: argus-engine/command-center:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        <<: *dotnet-build-args
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      Argus__ListenPlainHttp: "true"
      Argus__Diagnostics__Enabled: "true"
      Argus__ComponentUpdater__Enabled: ${ARGUS_COMPONENT_UPDATER_ENABLED:-true}
      Argus__ComponentUpdater__RepositoryPath: /workspace
      Argus__ComponentUpdater__ComposeFilePath: /workspace/deploy/docker-compose.yml
      Argus__ComponentUpdater__GitRemote: ${ARGUS_COMPONENT_UPDATER_GIT_REMOTE:-origin}
      Argus__ComponentUpdater__MainBranch: ${ARGUS_COMPONENT_UPDATER_MAIN_BRANCH:-main}
      Argus__ComponentUpdater__RequireCleanWorkingTree: ${ARGUS_COMPONENT_UPDATER_REQUIRE_CLEAN_TREE:-true}
      AWS_REGION: ${AWS_REGION:-}
      ECS_CLUSTER: ${ECS_CLUSTER:-argus-engine}
      ECS_SUBNETS: ${ECS_SUBNETS:-}
      ECS_SECURITY_GROUPS: ${ECS_SECURITY_GROUPS:-}
      ECS_LAUNCH_TYPE: ${ECS_LAUNCH_TYPE:-FARGATE}
      ECS_ASSIGN_PUBLIC_IP: ${ECS_ASSIGN_PUBLIC_IP:-ENABLED}
      ECS_TASK_EXECUTION_ROLE_ARN: ${ECS_TASK_EXECUTION_ROLE_ARN:-}
      ECS_TASK_ROLE_ARN: ${ECS_TASK_ROLE_ARN:-}
      WORKER_SPIDER_SERVICE: ${WORKER_SPIDER_SERVICE:-argus-worker-spider}
      WORKER_ENUM_SERVICE: ${WORKER_ENUM_SERVICE:-argus-worker-enum}
      WORKER_PORTSCAN_SERVICE: ${WORKER_PORTSCAN_SERVICE:-argus-worker-portscan}
      WORKER_HIGHVALUE_SERVICE: ${WORKER_HIGHVALUE_SERVICE:-argus-worker-highvalue}
      WORKER_TECHID_SERVICE: ${WORKER_TECHID_SERVICE:-argus-worker-techid}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ..:/workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      filestore-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gatekeeper:
    image: argus-engine/gatekeeper:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Gatekeeper
        APP_DLL: ArgusEngine.Gatekeeper.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-spider:
    image: argus-engine/worker-spider:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.Spider
        APP_DLL: ArgusEngine.Workers.Spider.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Spider__Http__AllowInsecureSsl: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 10

  worker-enum:
    image: argus-engine/worker-enum:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker-enum
      args:
        <<: *enum-build-args
        PROJECT_DIR: ArgusEngine.Workers.Enumeration
        APP_DLL: ArgusEngine.Workers.Enumeration.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Enumeration__UseSubfinder: "true"
      Enumeration__SubfinderPath: /usr/local/bin/subfinder
      Enumeration__SubfinderAllSources: "true"
      Enumeration__SubfinderRecursive: "true"
      Enumeration__SubfinderTimeoutSeconds: "180"
      Enumeration__UseAmass: "true"
      Enumeration__AmassPath: /usr/local/bin/amass
      Enumeration__AmassActive: "true"
      Enumeration__AmassBruteForce: "true"
      Enumeration__AmassTimeoutSeconds: "900"
      Enumeration__UseDnsFallback: "true"
      Enumeration__DnsFallbackMaxCandidates: "300"
      Enumeration__SubdomainWordlistPath: /opt/argus/wordlists/subdomains.txt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 10

  worker-portscan:
    image: argus-engine/worker-portscan:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.PortScan
        APP_DLL: ArgusEngine.Workers.PortScan.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-highvalue:
    image: argus-engine/worker-highvalue:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.HighValue
        APP_DLL: ArgusEngine.Workers.HighValue.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-techid:
    image: argus-engine/worker-techid:${ARGUS_ENGINE_VERSION:-2.6.2}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.TechnologyIdentification
        APP_DLL: ArgusEngine.Workers.TechnologyIdentification.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
    depends_on:
      command-center:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
