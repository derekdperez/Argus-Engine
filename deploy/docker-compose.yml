# Run from the repository root:
# docker compose -f deploy/docker-compose.yml up -d --build
#
# Project-specific deployment version rule:
# Bump ARGUS_ENGINE_VERSION before every deploy. The Command Center System Status
# screen reads container image labels/tags and will show stale versions if this
# stays unchanged.
#
# Database connection pool tuning:
# Each service can override Argus__Postgres__MaxPoolSize and
# Argus__FileStore__MaxPoolSize below. Keep worker pools small because worker
# replicas multiply total PostgreSQL connections quickly.

name: argus-engine

x-component-version: &component-version ${ARGUS_ENGINE_VERSION:-2.6.3}

x-dotnet-build-args: &dotnet-build-args
  BUILD_SOURCE_STAMP: ${BUILD_SOURCE_STAMP:-unknown}
  COMPONENT_VERSION: *component-version

x-enum-build-args: &enum-build-args
  <<: *dotnet-build-args
  SUBFINDER_VERSION: ${SUBFINDER_VERSION:-2.14.0}
  AMASS_VERSION: ${AMASS_VERSION:-5.1.1}

x-common-env: &common-env
  ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=argus_engine;Username=argus;Password=argus
  ConnectionStrings__FileStore: Host=postgres;Port=5432;Database=argus_engine_files;Username=argus;Password=argus
  # Conservative defaults for services that do not override their own pool sizes.
  Argus__Postgres__MaxPoolSize: ${ARGUS_POSTGRES_MAX_POOL_SIZE:-4}
  Argus__FileStore__MaxPoolSize: ${ARGUS_FILESTORE_MAX_POOL_SIZE:-1}
  ConnectionStrings__Redis: redis:6379
  RabbitMq__Host: rabbitmq
  RabbitMq__Username: argus
  RabbitMq__Password: argus
  RabbitMq__VirtualHost: /
  RabbitMq__ManagementUrl: http://rabbitmq:15672
  ARGUS_COMPONENT_VERSION: *component-version
  Argus__Diagnostics__ApiKey: ${ARGUS_DIAGNOSTICS_API_KEY:-local-dev-diagnostics-key-change-me}

configs:
  filestore_db_init_sh:
    content: |
      #!/bin/sh
      set -e

      echo "Connecting to postgres as user 'argus' to check/create 'argus_engine_files'..."

      # Use argus_engine as the maintenance DB since it's what we defined in POSTGRES_DB
      if psql -h postgres -U argus -d argus_engine -tAc "SELECT 1 FROM pg_database WHERE datname = 'argus_engine_files'" 2>/dev/null | grep -q '1'; then
        echo "argus_engine_files already exists; nothing to do."
        exit 0
      fi

      echo "Creating database argus_engine_files..."
      psql -h postgres -U argus -d argus_engine -v ON_ERROR_STOP=1 -c "CREATE DATABASE argus_engine_files OWNER argus;"
      echo "Done."

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-300}"]
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus_engine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  filestore-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: argus
    configs:
      - source: filestore_db_init_sh
        target: /run/filestore-db-init.sh
    entrypoint: ["/bin/sh", "/run/filestore-db-init.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: argus
      RABBITMQ_DEFAULT_PASS: argus
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  command-center-gateway:
    image: argus-engine/command-center-gateway:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Gateway
        APP_DLL: ArgusEngine.CommandCenter.Gateway.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      CommandCenter__OperationsBaseUrl: http://command-center-operations-api:8080/
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      command-center-web:
        condition: service_healthy
      command-center-operations-api:
        condition: service_healthy

  command-center-operations-api:
    image: argus-engine/command-center-operations-api:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Operations.Api
        APP_DLL: ArgusEngine.CommandCenter.Operations.Api.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      Argus__Postgres__MaxPoolSize: ${ARGUS_OPERATIONS_API_POSTGRES_MAX_POOL_SIZE:-4}
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-discovery-api:
    image: argus-engine/command-center-discovery-api:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Discovery.Api
        APP_DLL: ArgusEngine.CommandCenter.Discovery.Api.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      Argus__Postgres__MaxPoolSize: ${ARGUS_DISCOVERY_API_POSTGRES_MAX_POOL_SIZE:-4}
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-worker-control-api:
    image: argus-engine/command-center-worker-control-api:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.WorkerControl.Api
        APP_DLL: ArgusEngine.CommandCenter.WorkerControl.Api.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_CONTROL_API_POSTGRES_MAX_POOL_SIZE:-4}
      AWS_REGION: ${AWS_REGION:-}
      ECS_CLUSTER: ${ECS_CLUSTER:-argus-engine}
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-maintenance-api:
    image: argus-engine/command-center-maintenance-api:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Maintenance.Api
        APP_DLL: ArgusEngine.CommandCenter.Maintenance.Api.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      Argus__Postgres__MaxPoolSize: ${ARGUS_MAINTENANCE_API_POSTGRES_MAX_POOL_SIZE:-4}
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-updates-api:
    image: argus-engine/command-center-updates-api:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Updates.Api
        APP_DLL: ArgusEngine.CommandCenter.Updates.Api.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8087:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  command-center-realtime:
    image: argus-engine/command-center-realtime:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Realtime.Host
        APP_DLL: ArgusEngine.CommandCenter.Realtime.Host.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  command-center-bootstrapper:
    image: argus-engine/command-center-bootstrapper:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Bootstrapper
        APP_DLL: ArgusEngine.CommandCenter.Bootstrapper.dll
    environment:
      <<: *common-env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      filestore-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-spider-dispatcher:
    image: argus-engine/command-center-spider-dispatcher:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.SpiderDispatcher
        APP_DLL: ArgusEngine.CommandCenter.SpiderDispatcher.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  command-center-web:
    image: argus-engine/command-center-web:${ARGUS_ENGINE_VERSION:-2.6.3}

    build:
      context: ..
      dockerfile: deploy/Dockerfile.commandcenter-host
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.CommandCenter.Web
        APP_DLL: ArgusEngine.CommandCenter.Web.dll
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      CommandCenter__GatewayBaseUrl: http://command-center-gateway:8080/
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  gatekeeper:
    image: argus-engine/gatekeeper:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Gatekeeper
        APP_DLL: ArgusEngine.Gatekeeper.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Argus__Postgres__MaxPoolSize: ${ARGUS_GATEKEEPER_POSTGRES_MAX_POOL_SIZE:-2}
      Argus__FileStore__MaxPoolSize: ${ARGUS_GATEKEEPER_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-spider:
    image: argus-engine/worker-spider:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.Spider
        APP_DLL: ArgusEngine.Workers.Spider.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_SPIDER_POSTGRES_MAX_POOL_SIZE:-3}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_SPIDER_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_SPIDER_REPLICAS:-2}

  worker-http-requester:
    image: argus-engine/worker-http-requester:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.HttpRequester
        APP_DLL: ArgusEngine.Workers.HttpRequester.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      HttpRequester__AllowInsecureSsl: "false"
      HttpRateLimit__DefaultDelayMs: 500
      HttpRateLimit__MaxDelayMs: 5000
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_HTTP_REQUESTER_POSTGRES_MAX_POOL_SIZE:-5}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_HTTP_REQUESTER_FILESTORE_MAX_POOL_SIZE:-2}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_HTTP_REQUESTER_REPLICAS:-2}

  worker-enum:
    image: argus-engine/worker-enum:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker-enum
      args:
        <<: *enum-build-args
        PROJECT_DIR: ArgusEngine.Workers.Enumeration
        APP_DLL: ArgusEngine.Workers.Enumeration.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Enumeration__UseSubfinder: "true"
      Enumeration__SubfinderPath: /usr/local/bin/subfinder
      Enumeration__SubfinderAllSources: "true"
      Enumeration__SubfinderRecursive: "true"
      Enumeration__SubfinderTimeoutSeconds: "180"
      Enumeration__UseAmass: "true"
      Enumeration__AmassPath: /usr/local/bin/amass
      Enumeration__AmassActive: "true"
      Enumeration__AmassBruteForce: "true"
      Enumeration__AmassTimeoutSeconds: "900"
      Enumeration__UseDnsFallback: "true"
      Enumeration__DnsFallbackMaxCandidates: "300"
      Enumeration__SubdomainWordlistPath: /opt/argus/wordlists/subdomains.txt
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_ENUM_POSTGRES_MAX_POOL_SIZE:-2}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_ENUM_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_ENUM_REPLICAS:-2}

  worker-portscan:
    image: argus-engine/worker-portscan:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.PortScan
        APP_DLL: ArgusEngine.Workers.PortScan.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_PORTSCAN_POSTGRES_MAX_POOL_SIZE:-2}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_PORTSCAN_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_PORTSCAN_REPLICAS:-2}

  worker-highvalue:
    image: argus-engine/worker-highvalue:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.HighValue
        APP_DLL: ArgusEngine.Workers.HighValue.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_HIGHVALUE_POSTGRES_MAX_POOL_SIZE:-2}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_HIGHVALUE_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_HIGHVALUE_REPLICAS:-2}

  worker-techid:
    image: argus-engine/worker-techid:${ARGUS_ENGINE_VERSION:-2.6.3}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: ArgusEngine.Workers.TechnologyIdentification
        APP_DLL: ArgusEngine.Workers.TechnologyIdentification.dll
    environment:
      <<: *common-env
      Argus__SkipStartupDatabase: "true"
      Argus__Postgres__MaxPoolSize: ${ARGUS_WORKER_TECHID_POSTGRES_MAX_POOL_SIZE:-2}
      Argus__FileStore__MaxPoolSize: ${ARGUS_WORKER_TECHID_FILESTORE_MAX_POOL_SIZE:-1}
    depends_on:
      command-center-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: ${ARGUS_WORKER_TECHID_REPLICAS:-2}

volumes:
  pgdata:
