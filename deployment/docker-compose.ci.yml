services:
  command-center-gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Argus__Diagnostics__ApiKey: ${ARGUS_DIAGNOSTICS_API_KEY:-ci-smoke-test-key}
      Argus__Diagnostics__Enabled: "true"
      CommandCenter__Services__Web: http://command-center-web:8080/
      CommandCenter__Services__Discovery: http://command-center-discovery-api:8080/
      CommandCenter__Services__Operations: http://command-center-operations-api:8080/
      CommandCenter__Services__WorkerControl: http://command-center-worker-control-api:8080/
      CommandCenter__Services__Maintenance: http://command-center-maintenance-api:8080/
