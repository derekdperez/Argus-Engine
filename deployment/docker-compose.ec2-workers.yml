name: nightmare-v2-ec2-workers

x-dotnet-build-args: &dotnet-build-args
  BUILD_SOURCE_STAMP: ${BUILD_SOURCE_STAMP:-ec2-worker}

x-enum-build-args: &enum-build-args
  <<: *dotnet-build-args
  SUBFINDER_VERSION: ${SUBFINDER_VERSION:-2.14.0}
  AMASS_VERSION: ${AMASS_VERSION:-5.1.1}

x-worker-env: &worker-env
  ConnectionStrings__Postgres: ${NIGHTMARE_POSTGRES:?Set NIGHTMARE_POSTGRES}
  ConnectionStrings__FileStore: ${NIGHTMARE_FILESTORE:?Set NIGHTMARE_FILESTORE}
  ConnectionStrings__Redis: ${NIGHTMARE_REDIS:?Set NIGHTMARE_REDIS}
  RabbitMq__Host: ${NIGHTMARE_RABBITMQ_HOST:?Set NIGHTMARE_RABBITMQ_HOST}
  RabbitMq__Username: ${NIGHTMARE_RABBITMQ_USERNAME:-nightmare}
  RabbitMq__Password: ${NIGHTMARE_RABBITMQ_PASSWORD:-nightmare}
  RabbitMq__VirtualHost: ${NIGHTMARE_RABBITMQ_VHOST:-/}
  RabbitMq__ManagementUrl: ${NIGHTMARE_RABBITMQ_MANAGEMENT_URL:?Set NIGHTMARE_RABBITMQ_MANAGEMENT_URL}
  Nightmare__SkipStartupDatabase: "true"
  NIGHTMARE_SKIP_STARTUP_DATABASE: "1"
  Nightmare__Ec2WorkerMachineId: ${NIGHTMARE_EC2_WORKER_MACHINE_ID:-}

services:
  worker-spider:
    image: nightmare-v2/worker-spider:ec2
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.Spider
        APP_DLL: NightmareV2.Workers.Spider.dll
    environment:
      <<: *worker-env
      Spider__Http__AllowInsecureSsl: "false"

  worker-enum:
    image: nightmare-v2/worker-enum:ec2
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker-enum
      args:
        <<: *enum-build-args
        PROJECT_DIR: NightmareV2.Workers.Enum
        APP_DLL: NightmareV2.Workers.Enum.dll
    environment:
      <<: *worker-env
      Enumeration__UseSubfinder: "true"
      Enumeration__SubfinderPath: /usr/local/bin/subfinder
      Enumeration__SubfinderAllSources: "true"
      Enumeration__SubfinderRecursive: "true"
      Enumeration__SubfinderTimeoutSeconds: "180"
      Enumeration__UseAmass: "true"
      Enumeration__AmassPath: /usr/local/bin/amass
      Enumeration__AmassActive: "true"
      Enumeration__AmassBruteForce: "true"
      Enumeration__AmassTimeoutSeconds: "900"
      Enumeration__UseDnsFallback: "true"
      Enumeration__DnsFallbackMaxCandidates: "300"
      Enumeration__SubdomainWordlistPath: /opt/nightmare/wordlists/subdomains.txt

  worker-portscan:
    image: nightmare-v2/worker-portscan:ec2
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.PortScan
        APP_DLL: NightmareV2.Workers.PortScan.dll
    environment:
      <<: *worker-env

  worker-highvalue:
    image: nightmare-v2/worker-highvalue:ec2
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.HighValue
        APP_DLL: NightmareV2.Workers.HighValue.dll
    environment:
      <<: *worker-env

  worker-techid:
    image: nightmare-v2/worker-techid:ec2
    build:
      context: ..
      dockerfile: deployment/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.TechnologyIdentification
        APP_DLL: NightmareV2.Workers.TechnologyIdentification.dll
    environment:
      <<: *worker-env
